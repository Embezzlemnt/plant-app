<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#993556"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Sacha's Soil"/>
<link rel="manifest" href="manifest.json"/>
<title>Sacha's Soil</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gd:#72243E;--gm:#993556;--gl:#FBEAF0;--gb:#F4C0D1;
  --am:#854F0B;--al:#FAEEDA;--ab:#FAC775;
  --bl:#993556;--bll:#FBEAF0;--blb:#F4C0D1;
  --rd:#993C1D;--rl:#FAECE7;--rb:#F0997B;
  --tx:#1a1a1a;--txm:#888;--bg:#fff;--bgs:#fdf5f8;--br:#f0d8e2;
}
body{font-family:'Nunito',sans-serif;background:var(--bgs);color:var(--tx);min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;}
.topbar{background:var(--gl);border-bottom:1px solid var(--gb);padding:14px 16px 0;position:sticky;top:0;z-index:10;}
.topbar h1{font-family:'Fredoka One',cursive;font-size:26px;font-weight:400;color:var(--gd);text-align:center;padding-bottom:12px;}
.tabs{display:flex;}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:700;color:var(--gm);border-bottom:3px solid transparent;cursor:pointer;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.page{display:none;padding:14px 14px 80px;}
.page.active{display:block;}
.banner{background:var(--gl);border:1px solid var(--gb);border-radius:14px;padding:13px 14px;margin-bottom:14px;}
.banner-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.banner-top h2{font-family:'Fredoka One',cursive;font-size:15px;font-weight:400;color:var(--gd);}
.bc{font-size:12px;color:var(--gm);font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;border:none;}
.chip.needs{background:var(--gm);color:var(--gl);}
.chip.done{background:var(--gb);color:var(--gd);text-decoration:line-through;}
.chip.over{background:#D85A30;color:var(--rl);}
.em{font-size:13px;color:var(--gm);font-style:italic;}
.st{font-family:'Fredoka One',cursive;font-size:17px;font-weight:400;margin-bottom:10px;}
.plant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.pcard{background:var(--bg);border:1px solid var(--gb);border-radius:14px;padding:13px 11px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.pcard .emj{font-size:28px;display:block;margin-bottom:5px;}
.pcard .pn{font-weight:700;font-size:14px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard .pt{font-size:11px;color:var(--txm);margin-bottom:8px;}
.bw{height:5px;background:var(--gl);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.bar{height:100%;border-radius:3px;background:var(--gm);}
.bar.low{background:#D85A30;}
.ps{font-size:11px;color:var(--txm);}
.ps.soon{color:#D85A30;font-weight:700;}
.add-btn{width:100%;background:var(--gl);border:2px dashed var(--gb);border-radius:14px;padding:15px;font-family:'Fredoka One',cursive;font-size:15px;font-weight:400;color:var(--gm);cursor:pointer;margin-bottom:14px;}
.add-log-btn{width:100%;background:var(--bll);border:2px dashed var(--blb);border-radius:14px;padding:13px;font-family:'Fredoka One',cursive;font-size:15px;font-weight:400;color:var(--bl);cursor:pointer;margin-bottom:14px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.fbtn{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--gb);background:var(--bg);color:var(--gm);cursor:pointer;}
.fbtn.active{background:var(--gm);color:var(--gl);border-color:var(--gm);}
.log-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.log-entry{background:var(--bg);border:1px solid var(--br);border-radius:12px;padding:11px 13px;border-left:3px solid var(--gb);}
.log-entry.water{border-left-color:var(--gm);}
.log-entry.fertilize{border-left-color:var(--am);}
.log-entry.repot{border-left-color:#D85A30;}
.log-entry.note{border-left-color:var(--bl);}
.log-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.lpn{font-weight:700;font-size:13px;}
.ld{font-size:11px;color:var(--txm);}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-right:4px;}
.bw2{background:var(--gl);color:var(--gd);}
.bf{background:var(--al);color:var(--am);}
.br2{background:var(--rl);color:var(--rd);}
.bn{background:var(--bll);color:var(--bl);}
.lt{font-size:13px;color:var(--txm);line-height:1.4;margin-top:3px;}
.rc{background:var(--bg);border:1px solid var(--br);border-radius:14px;padding:14px;margin-bottom:12px;}
.rc h3{font-family:'Fredoka One',cursive;font-size:15px;font-weight:400;margin-bottom:10px;}
.rr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--br);}
.rr:last-child{border-bottom:none;}
.rl2{font-size:13px;font-weight:600;}
.rs{font-size:11px;color:var(--txm);margin-top:2px;}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--br);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;}
.toggle.on{background:var(--gm);}
.toggle.on::after{left:21px;}
.time-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--br);}
.time-row label{font-size:13px;flex:1;font-weight:600;}
.time-row input[type=time]{padding:7px 10px;border:1px solid var(--br);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--bgs);}
.nb{border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.5;margin-bottom:12px;}
.nb.info{background:var(--gl);color:var(--gd);border:1px solid var(--gb);}
.nb.warn{background:var(--al);color:var(--am);border:1px solid var(--ab);}
.nb.err{background:var(--rl);color:var(--rd);border:1px solid var(--rb);}
.test-btn{background:var(--gm);color:var(--gl);border:none;border-radius:10px;padding:10px 18px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;}
.ui{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--br);}
.ui:last-child{border-bottom:none;}
.un{font-size:13px;font-weight:700;}
.uschl{font-size:11px;color:var(--txm);}
.ub{margin-left:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap;}
.ub.today{background:var(--gl);color:var(--gd);}
.ub.soon{background:var(--al);color:var(--am);}
.ub.fine{background:var(--bgs);color:var(--txm);border:0.5px solid var(--br);}
.ub.over{background:var(--rl);color:var(--rd);}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center;}
.backdrop.open{display:flex;}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.mh{width:36px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 16px;}
.modal h2{font-family:'Fredoka One',cursive;font-size:20px;font-weight:400;color:var(--gd);margin-bottom:14px;}
.fr{margin-bottom:12px;}
.fr label{display:block;font-size:11px;font-weight:700;color:var(--txm);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;}
.fr input,.fr select,.fr textarea{width:100%;padding:10px 12px;border:1px solid var(--br);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;background:var(--bgs);color:var(--tx);}
.fr textarea{resize:vertical;min-height:70px;}
.epicker{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.eopt{font-size:22px;padding:5px 6px;border-radius:8px;border:2px solid transparent;cursor:pointer;}
.eopt.sel{border-color:var(--gm);background:var(--gl);}
.sun-row{display:flex;gap:6px;margin-top:4px;}
.sopt{flex:1;text-align:center;padding:7px 2px;border:1.5px solid var(--br);border-radius:8px;font-size:12px;cursor:pointer;color:var(--txm);font-weight:600;}
.sopt.sel{border-color:var(--gm);background:var(--gl);color:var(--gd);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.bs{flex:1;background:var(--gm);color:var(--gl);border:none;border-radius:12px;padding:12px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;}
.bs.blue{background:var(--bl);}
.bc2{background:var(--bgs);border:1px solid var(--br);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--txm);cursor:pointer;}
.de{font-size:50px;text-align:center;display:block;margin-bottom:6px;}
.dna{font-family:'Fredoka One',cursive;font-size:23px;font-weight:400;color:var(--gd);text-align:center;}
.dty{font-size:12px;color:var(--txm);text-align:center;margin-bottom:12px;}
.dno{background:var(--gl);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--gd);margin-bottom:12px;line-height:1.5;}
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--br);font-size:13px;}
.dl{color:var(--txm);}
.dv{font-weight:700;}
.bw3{width:100%;background:var(--gm);color:var(--gl);border:none;border-radius:12px;padding:13px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;margin-top:10px;}
.be{width:100%;background:var(--bll);color:var(--bl);border:1px solid var(--blb);border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}
.bdl{width:100%;background:none;border:1px solid var(--rb);border-radius:12px;padding:9px;font-size:12px;color:var(--rd);cursor:pointer;margin-top:8px;}
.es{text-align:center;padding:30px 10px;color:var(--txm);font-size:13px;font-style:italic;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Sacha's Soil 🌸</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('garden')">garden</button>
      <button class="tab" onclick="switchTab('journal')">journal</button>
      <button class="tab" onclick="switchTab('reminders')">reminders</button>
    </div>
  </div>

  <div class="page active" id="tab-garden">
    <div style="height:12px"></div>
    <div class="banner">
      <div class="banner-top"><h2 id="bannerDate">today</h2><span class="bc" id="bannerCount"></span></div>
      <div class="chips" id="waterChips"></div>
    </div>
    <p class="st">my plants</p>
    <div class="plant-grid" id="plantGrid"></div>
    <button class="add-btn" onclick="openAddPlant()">+ add a plant</button>
  </div>

  <div class="page" id="tab-journal">
    <div style="height:12px"></div>
    <div class="filter-row">
      <button class="fbtn active" onclick="setFilter(this,'all')">all</button>
      <button class="fbtn" onclick="setFilter(this,'water')">watered</button>
      <button class="fbtn" onclick="setFilter(this,'fertilize')">fertilized</button>
      <button class="fbtn" onclick="setFilter(this,'repot')">repotted</button>
      <button class="fbtn" onclick="setFilter(this,'note')">notes</button>
    </div>
    <div class="log-list" id="logList"></div>
    <button class="add-log-btn" onclick="openAddLog()">+ add journal entry</button>
  </div>

  <div class="page" id="tab-reminders">
    <div style="height:12px"></div>
    <div id="notifStatus"></div>
    <div class="rc">
      <h3>notifications</h3>
      <div class="rr">
        <div><div class="rl2">daily watering reminder</div><div class="rs">notified when plants need water today</div></div>
        <button class="toggle" id="togDaily" onclick="toggleRem('daily')"></button>
      </div>
      <div class="time-row">
        <label>reminder time</label>
        <input type="time" id="remTime" value="08:00" onchange="saveSettings()"/>
      </div>
      <div class="rr">
        <div><div class="rl2">2-day heads-up</div><div class="rs">early warning before a plant needs water</div></div>
        <button class="toggle" id="togAhead" onclick="toggleRem('ahead')"></button>
      </div>
    </div>
    <button class="test-btn" onclick="sendTest()">send test notification</button>
    <div style="height:14px"></div>
    <div class="rc"><h3>upcoming care</h3><div id="upcomingList"></div></div>
  </div>
</div>

<!-- PLANT MODAL -->
<div class="backdrop" id="plantModal">
  <div class="modal">
    <div class="mh"></div>
    <h2 id="pmTitle">add a plant</h2>
    <div class="fr"><label>icon</label><div class="epicker" id="ePicker"></div></div>
    <div class="fr"><label>name</label><input id="fName" placeholder="e.g. Rosie"/></div>
    <div class="fr"><label>type</label><input id="fType" placeholder="e.g. succulent, herb"/></div>
    <div class="fr"><label>water every</label>
      <select id="fWater">
        <option value="1">every day</option><option value="2">every 2 days</option>
        <option value="3" selected>every 3 days</option><option value="5">every 5 days</option>
        <option value="7">once a week</option><option value="10">every 10 days</option>
        <option value="14">every 2 weeks</option><option value="21">every 3 weeks</option>
        <option value="30">once a month</option>
      </select>
    </div>
    <div class="fr"><label>sunlight</label>
      <div class="sun-row">
        <div class="sopt" data-v="low" onclick="pickSun(this)">low</div>
        <div class="sopt sel" data-v="medium" onclick="pickSun(this)">medium</div>
        <div class="sopt" data-v="bright" onclick="pickSun(this)">bright</div>
        <div class="sopt" data-v="full sun" onclick="pickSun(this)">full sun</div>
      </div>
    </div>
    <div class="fr"><label>care notes</label><textarea id="fNotes" placeholder="any tips for this plant..."></textarea></div>
    <div class="modal-btns">
      <button class="bc2" onclick="closePlantModal()">cancel</button>
      <button class="bs" onclick="savePlant()">save plant</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="backdrop" id="detailModal">
  <div class="modal">
    <div class="mh"></div>
    <span class="de" id="dEmoji"></span>
    <p class="dna" id="dName"></p>
    <p class="dty" id="dType"></p>
    <div id="dNotes"></div>
    <div class="dr"><span class="dl">watering</span><span class="dv" id="dSched"></span></div>
    <div class="dr"><span class="dl">sunlight</span><span class="dv" id="dSun"></span></div>
    <div class="dr"><span class="dl">last watered</span><span class="dv" id="dLast"></span></div>
    <div class="dr"><span class="dl">next watering</span><span class="dv" id="dNext"></span></div>
    <button class="bw3" onclick="waterFromDetail()">watered today! 💧</button>
    <button class="be" onclick="editFromDetail()">edit plant</button>
    <button class="bc2" style="width:100%;margin-top:8px" onclick="closeDetail()">close</button>
    <button class="bdl" onclick="deletePlant()">remove plant</button>
  </div>
</div>

<!-- LOG MODAL -->
<div class="backdrop" id="logModal">
  <div class="modal">
    <div class="mh"></div>
    <h2>journal entry</h2>
    <div class="fr"><label>plant</label><select id="lPlant"><option value="">-- pick a plant --</option></select></div>
    <div class="fr"><label>type</label>
      <select id="lType">
        <option value="water">watered 💧</option><option value="fertilize">fertilized 🌿</option>
        <option value="repot">repotted 🪴</option><option value="note">general note 📝</option>
      </select>
    </div>
    <div class="fr"><label>note (optional)</label><textarea id="lNote" placeholder="how's it looking?"></textarea></div>
    <div class="modal-btns">
      <button class="bc2" onclick="closeLogModal()">cancel</button>
      <button class="bs blue" onclick="saveLog()">save entry</button>
    </div>
  </div>
</div>

<script>
const EMOJIS=['🌱','🌿','🪴','🌵','🌹','🌻','🌸','🌺','🍀','🌾','🍃','🪷','🌷','🌼','🫐','🍓','🍋','🌴','🎋','🎍','🌞','🪸','🌏','🌈'];
const SCHED={1:'every day',2:'every 2 days',3:'every 3 days',5:'every 5 days',7:'once a week',10:'every 10 days',14:'every 2 weeks',21:'every 3 weeks',30:'once a month'};
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DA=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let plants=JSON.parse(localStorage.getItem('mg_plants')||'[]');
let logs=JSON.parse(localStorage.getItem('mg_logs')||'[]');
let settings=JSON.parse(localStorage.getItem('mg_settings')||'{"daily":false,"ahead":false,"time":"08:00"}');
let selEmoji='🌱',selSun='medium',editId=null,detailId=null,logFilter='all';
function saveP(){localStorage.setItem('mg_plants',JSON.stringify(plants));}
function saveL(){localStorage.setItem('mg_logs',JSON.stringify(logs));}
function saveSettings(){settings.time=document.getElementById('remTime').value;localStorage.setItem('mg_settings',JSON.stringify(settings));scheduleChecks();}
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function addDays(b,n){const d=new Date(b);d.setDate(d.getDate()+n);return d;}
function daysUntil(p){if(!p.lastWatered)return 0;return Math.round((addDays(p.lastWatered,p.waterEvery)-today())/86400000);}
function relDate(ts){if(!ts)return'never';const d=Math.round((new Date(ts)-today())/86400000);if(d===0)return'today';if(d===1)return'tomorrow';if(d===-1)return'yesterday';if(d<0)return Math.abs(d)+' days ago';return'in '+d+' days';}
function fmtDate(ts){const d=new Date(ts);return MO[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>{if(b.textContent===t)b.classList.add('active');});
  if(t==='reminders')renderReminders();
  if(t==='journal')renderLogs();
}
function renderGarden(){
  const now=new Date();
  document.getElementById('bannerDate').textContent=DA[now.getDay()]+', '+MO[now.getMonth()]+' '+now.getDate();
  const needs=plants.filter(p=>daysUntil(p)<=0);
  document.getElementById('bannerCount').textContent=needs.length?needs.length+' need water':'';
  const chips=document.getElementById('waterChips');
  if(!needs.length){chips.innerHTML='<span class="em">all of Sacha\'s plants are happy today! 🌸</span>';}
  else chips.innerHTML=needs.map(p=>`<button class="chip ${daysUntil(p)<0?'over':'needs'}" onclick="quickWater(${p.id})">${p.emoji} ${p.name}</button>`).join('');
  const grid=document.getElementById('plantGrid');
  if(!plants.length){grid.innerHTML='<p class="es" style="grid-column:1/-1">no plants yet — add one below!</p>';return;}
  grid.innerHTML=plants.map(p=>{
    const d=daysUntil(p);const pct=Math.max(0,Math.min(100,Math.round((d/p.waterEvery)*100)));const low=d<=0;
    return`<div class="pcard" onclick="openDetail(${p.id})"><span class="emj">${p.emoji}</span><p class="pn">${p.name}</p><p class="pt">${p.type||'plant'}</p><div class="bw"><div class="bar${low?' low':''}" style="width:${low?100:pct}%"></div></div><p class="ps${low?' soon':''}">${low?(d<0?'overdue!':'water today!'):'water in '+d+' day'+(d===1?'':'s')}</p></div>`;
  }).join('');
}
function quickWater(id){
  plants=plants.map(p=>p.id===id?{...p,lastWatered:today().getTime()}:p);
  logs.unshift({id:Date.now(),plantId:id,type:'water',note:'',date:Date.now()});
  saveP();saveL();renderGarden();
}
function buildEPicker(){
  document.getElementById('ePicker').innerHTML=EMOJIS.map(e=>`<span class="eopt${e===selEmoji?' sel':''}" onclick="pickEmoji(this,'${e}')">${e}</span>`).join('');
}
function pickEmoji(el,e){selEmoji=e;document.querySelectorAll('.eopt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function pickSun(el){selSun=el.dataset.v;document.querySelectorAll('.sopt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function openAddPlant(){
  editId=null;selEmoji='🌱';selSun='medium';
  document.getElementById('pmTitle').textContent='add a plant';
  ['fName','fType','fNotes'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fWater').value='3';
  document.querySelectorAll('.sopt').forEach(x=>x.classList.toggle('sel',x.dataset.v==='medium'));
  buildEPicker();document.getElementById('plantModal').classList.add('open');
}
function closePlantModal(){document.getElementById('plantModal').classList.remove('open');}
function savePlant(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return;}
  const plant={id:editId||Date.now(),emoji:selEmoji,name,type:document.getElementById('fType').value.trim(),waterEvery:parseInt(document.getElementById('fWater').value),sun:selSun,notes:document.getElementById('fNotes').value.trim(),lastWatered:editId?(plants.find(p=>p.id===editId)||{}).lastWatered:today().getTime()};
  if(editId)plants=plants.map(p=>p.id===editId?plant:p);else plants.push(plant);
  saveP();closePlantModal();closeDetail();renderGarden();
}
function openDetail(id){
  detailId=id;const p=plants.find(x=>x.id===id);if(!p)return;
  document.getElementById('dEmoji').textContent=p.emoji;
  document.getElementById('dName').textContent=p.name;
  document.getElementById('dType').textContent=p.type||'plant';
  document.getElementById('dNotes').innerHTML=p.notes?`<div class="dno">${p.notes}</div>`:'';
  document.getElementById('dSched').textContent=SCHED[p.waterEvery]||`every ${p.waterEvery} days`;
  document.getElementById('dSun').textContent=p.sun||'medium';
  document.getElementById('dLast').textContent=p.lastWatered?relDate(p.lastWatered):'not yet';
  const next=p.lastWatered?addDays(p.lastWatered,p.waterEvery):today();
  document.getElementById('dNext').textContent=relDate(next.getTime());
  document.getElementById('detailModal').classList.add('open');
}
function closeDetail(){document.getElementById('detailModal').classList.remove('open');}
function waterFromDetail(){quickWater(detailId);closeDetail();}
function editFromDetail(){
  const p=plants.find(x=>x.id===detailId);if(!p)return;
  editId=detailId;selEmoji=p.emoji;selSun=p.sun||'medium';
  document.getElementById('pmTitle').textContent='edit plant';
  document.getElementById('fName').value=p.name;
  document.getElementById('fType').value=p.type||'';
  document.getElementById('fWater').value=p.waterEvery;
  document.getElementById('fNotes').value=p.notes||'';
  document.querySelectorAll('.sopt').forEach(x=>x.classList.toggle('sel',x.dataset.v===selSun));
  buildEPicker();document.getElementById('plantModal').classList.add('open');
}
function deletePlant(){
  if(!confirm('remove this plant?'))return;
  plants=plants.filter(p=>p.id!==detailId);
  logs=logs.filter(l=>l.plantId!==detailId);
  saveP();saveL();closeDetail();renderGarden();
}
function openAddLog(){
  const s=document.getElementById('lPlant');
  s.innerHTML='<option value="">-- pick a plant --</option>'+plants.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('');
  document.getElementById('lNote').value='';document.getElementById('lType').value='water';
  document.getElementById('logModal').classList.add('open');
}
function closeLogModal(){document.getElementById('logModal').classList.remove('open');}
function saveLog(){
  const pid=parseInt(document.getElementById('lPlant').value);
  if(!pid){document.getElementById('lPlant').focus();return;}
  const type=document.getElementById('lType').value,note=document.getElementById('lNote').value.trim();
  if(type==='water'){plants=plants.map(p=>p.id===pid?{...p,lastWatered:today().getTime()}:p);saveP();renderGarden();}
  logs.unshift({id:Date.now(),plantId:pid,type,note,date:Date.now()});
  saveL();closeLogModal();renderLogs();
}
function setFilter(el,f){
  logFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLogs();
}
function renderLogs(){
  const el=document.getElementById('logList');
  const badges={water:'bw2',fertilize:'bf',repot:'br2',note:'bn'};
  const labels={water:'watered',fertilize:'fertilized',repot:'repotted',note:'note'};
  const filtered=logFilter==='all'?logs:logs.filter(l=>l.type===logFilter);
  if(!filtered.length){el.innerHTML='<p class="es">no entries yet!</p>';return;}
  el.innerHTML=filtered.slice(0,60).map(l=>{
    const p=plants.find(x=>x.id===l.plantId);
    return`<div class="log-entry ${l.type}"><div class="log-top"><div><span class="badge ${badges[l.type]}">${labels[l.type]}</span><span class="lpn">${p?p.emoji+' '+p.name:'removed plant'}</span></div><span class="ld">${fmtDate(l.date)}</span></div>${l.note?`<p class="lt">${l.note}</p>`:''}</div>`;
  }).join('');
}
function updateToggles(){
  document.getElementById('togDaily').classList.toggle('on',settings.daily);
  document.getElementById('togAhead').classList.toggle('on',settings.ahead);
  if(settings.time)document.getElementById('remTime').value=settings.time;
}
async function toggleRem(key){
  if(!settings[key]){
    if(Notification.permission==='default')await Notification.requestPermission();
    if(Notification.permission!=='granted'){renderNotifStatus();return;}
  }
  settings[key]=!settings[key];
  localStorage.setItem('mg_settings',JSON.stringify(settings));
  updateToggles();scheduleChecks();renderNotifStatus();
}
function renderNotifStatus(){
  const el=document.getElementById('notifStatus');
  if(!('Notification' in window)){el.innerHTML='<div class="nb warn">your browser does not support notifications</div>';return;}
  if(Notification.permission==='denied'){el.innerHTML='<div class="nb err">notifications blocked — allow them in browser settings</div>';return;}
  if(Notification.permission==='granted'&&(settings.daily||settings.ahead)){el.innerHTML='<div class="nb info">reminders are on! you\'ll be notified at '+settings.time+' 🌿</div>';return;}
  el.innerHTML='<div class="nb info">turn on a reminder above to get notified when plants need water 💧</div>';
}
function sendTest(){
  if(Notification.permission!=='granted'){Notification.requestPermission().then(r=>{if(r==='granted')sendTest();});return;}
  new Notification("Sacha's Soil 🌸",{body:'reminders are working! your plants will thank you 💕'});
}
let _rt=null;
function scheduleChecks(){
  if(_rt)clearTimeout(_rt);
  if(!settings.daily&&!settings.ahead)return;
  const now=new Date();const[h,m]=(settings.time||'08:00').split(':').map(Number);
  const next=new Date();next.setHours(h,m,0,0);if(next<=now)next.setDate(next.getDate()+1);
  _rt=setTimeout(()=>{fireReminders();setInterval(fireReminders,86400000);},next-now);
}
function fireReminders(){
  if(Notification.permission!=='granted')return;
  if(settings.daily){const n=plants.filter(p=>daysUntil(p)<=0);if(n.length)new Notification('time to water! 💧',{body:n.map(p=>p.emoji+' '+p.name).join(', ')+' need water today'});}
  if(settings.ahead){const a=plants.filter(p=>{const d=daysUntil(p);return d===1||d===2;});if(a.length)new Notification('heads up! 🌿',{body:a.map(p=>p.emoji+' '+p.name).join(', ')+' will need water soon'});}
}
function renderReminders(){
  updateToggles();renderNotifStatus();
  const el=document.getElementById('upcomingList');
  if(!plants.length){el.innerHTML='<p class="es">no plants added yet</p>';return;}
  const sorted=[...plants].sort((a,b)=>daysUntil(a)-daysUntil(b));
  el.innerHTML=sorted.slice(0,10).map(p=>{
    const d=daysUntil(p);const cls=d<0?'over':d===0?'today':d<=2?'soon':'fine';
    const lbl=d<0?Math.abs(d)+'d overdue':d===0?'today':d===1?'tomorrow':'in '+d+' days';
    return`<div class="ui"><span style="font-size:22px">${p.emoji}</span><div><div class="un">${p.name}</div><div class="uschl">${SCHED[p.waterEvery]||'custom'}</div></div><span class="ub ${cls}">${lbl}</span></div>`;
  }).join('');
}
scheduleChecks();
renderGarden();
document.querySelectorAll('.backdrop').forEach(b=>{b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');});});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
